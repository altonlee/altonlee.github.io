<div class="col-md-6 col-lg-4" xmlns="http://www.w3.org/1999/html">
  <div class="card h-100">
    <div class="card-body">
	  {% if include.page.draft %}
	    <div class="float-end">📌</div>
	  {% endif %}
      <h5 class="card-title">{{ include.page.title }}</h5>
	  <div class="text-center">
		<img src="{{ site.baseurl }}/{{ include.page.image }}" height="225px" class="rounded">
	  </div>
      <p class="card-text"><small class="text-muted">{{ include.page.date }}</small></p>
      <p class="card-text">{{ include.page.summary }}</p>
      <p>
        {% for label in include.page.labels %}
        <span style="background-color: var(--tf-pill-bg)" class="badge rounded-pill">{{ label }}</span>
        {% endfor %}
      </p>
    </div>
    <div class="card-footer">
	  {% if page.projecturl %}
        <div class="text-center"><a href="{{ page.projecturl }}" class="btn btn-outline-dark">Project Site</a></div>
	  {% else %}
        <div class="text-center"><a href="{{ site.baseurl}}{{ include.page.url }}" class="btn btn-outline-dark">Read More</a></div>
	  {% endif %}
    </div>
  </div>
</div>
